name: Build unsigned IPA

# Builds WatchAI without code signing on a GitHub-hosted macOS runner (which
# already has Xcode installed). The resulting .ipa is unsigned — AltServer
# signs it for real on install, using your own Apple ID, on your own Mac.
# Nothing in this workflow ever touches your Apple ID or any credentials.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project WatchAI.xcodeproj

      - name: Archive (unsigned, for device)
        run: |
          xcodebuild \
            -project WatchAI.xcodeproj \
            -scheme WatchAI \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/WatchAI.xcarchive \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive

      - name: Package .ipa
        run: |
          set -e
          APP_PATH="build/WatchAI.xcarchive/Products/Applications/WatchAI.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find WatchAI.app in the archive" >&2
            find build/WatchAI.xcarchive -maxdepth 4 >&2
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r WatchAI.ipa Payload
          ls -lh WatchAI.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatchAI-ipa
          path: WatchAI.ipa
          retention-days: 14
