name: WatchAI
options:
  bundleIdPrefix: com.watchai
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

# MLX Swift LM: on-device LLM inference. watchOS is not a supported platform
# for this package (no Metal/GPU compute) — only the iOS target links it.
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.4

targets:
  WatchAI:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
    info:
      path: iOS/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchai.app
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - target: "WatchAI Watch App"
        embed: true
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace

  # Classic two-target WatchKit structure (pre-Xcode 14 "container" +
  # "extension" split), not the modern single-target watchapp2 format.
  # The single-target format hits a well-documented, still-open Xcode/
  # XCBuild bug when archived via command-line xcodebuild outside the
  # Xcode IDE (duplicate-output collision between the linker and the
  # embed-prep copy step for the watch app's own binary) — this older
  # structure predates that bug and has years of CI track record.
  #
  # The container ships no code of its own; all the real app code lives
  # in the Extension target below (Watch/ + Shared/ sources, unchanged).
  WatchAI Watch App:
    type: com.apple.product-type.application.watchapp2-container
    platform: watchOS
    sources: []
    info:
      path: WatchContainer/Info.plist
      properties:
        WKWatchKitApp: true
        WKCompanionAppBundleIdentifier: com.watchai.app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchai.app.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: YES
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        EXCLUDED_ARCHS: arm64_32
    dependencies:
      - target: "WatchAI Watch App Extension"
        embed: true
      - target: "WatchAI Complication"
        embed: true

  WatchAI Watch App Extension:
    type: com.apple.product-type.watchkit2-extension
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
    info:
      path: Watch/Info.plist
      properties:
        WKRunsIndependentlyOfCompanionApp: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.watchkit
          NSExtensionAttributes:
            WKAppBundleIdentifier: com.watchai.app.watchkitapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchai.app.watchkitapp.extension
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: YES
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        EXCLUDED_ARCHS: arm64_32

  WatchAI Complication:
    type: app-extension
    platform: watchOS
    sources:
      - path: Complication
    info:
      path: Complication/Info.plist
      properties:
        CFBundleDisplayName: WatchAI Complication
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchai.app.watchkitapp.complication
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: YES
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        EXCLUDED_ARCHS: arm64_32

schemes:
  WatchAI:
    build:
      targets:
        WatchAI: all
    run:
      config: Debug
    archive:
      config: Release
