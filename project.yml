name: WatchAI
options:
  bundleIdPrefix: com.watchai
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

# MLX Swift LM: on-device LLM inference. watchOS is not a supported platform
# for this package (no Metal/GPU compute) — only the iOS target links it.
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.4

targets:
  WatchAI:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
    info:
      path: iOS/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchai.app
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - target: "WatchAI Watch App"
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace

  WatchAI Watch App:
    type: application.watchapp2
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
    info:
      path: Watch/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.watchai.app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchai.app.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: NO
    dependencies:
      - target: "WatchAI Complication"
        embed: true

  WatchAI Complication:
    type: app-extension
    platform: watchOS
    sources:
      - path: Complication
    info:
      path: Complication/Info.plist
      properties:
        CFBundleDisplayName: WatchAI Complication
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchai.app.watchkitapp.complication
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: NO

schemes:
  WatchAI:
    build:
      targets:
        WatchAI: all
    run:
      config: Debug
    archive:
      config: Release
